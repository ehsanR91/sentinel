<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline — SentinelCore</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, Arial, sans-serif;
            background: #070f1b;
            color: #e2ecff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .card {
            max-width: 520px;
            width: 100%;
            padding: 2rem;
            border-radius: 24px;
            background: rgba(10, 19, 34, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(2rem, 5vw, 2.75rem);
        }

        p {
            margin: 0 0 1rem;
            color: #9bb7dc;
            line-height: 1.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.85rem 1.25rem;
            border-radius: 999px;
            border: 1px solid rgba(74, 158, 255, 0.22);
            background: #4a9eff;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .hint {
            margin-top: 1rem;
            font-size: 0.92rem;
            color: #8aa4c8;
        }
    </style>
</head>

<body>
    <div class="card" role="main">
        <h1>You're offline</h1>
        <p>SentinelCore is currently unable to connect to the network. You can still use cached pages, or refresh once
            the connection returns.</p>
        <a class="btn" href="/">Reload</a>
        <p class="hint">If this app is installed, please reconnect to the same server host and reload.</p>
    </div>
</body>

</html>
